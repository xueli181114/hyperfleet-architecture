# HyperFleet Adapter Task Configuration Template (MVP)
#
# This template is aligned with the real implementation at:
# https://github.com/hyperfleet/hyperfleet-adapter/charts/examples/maestro/adapter-task-config.yaml
#
# TEMPLATE SYNTAX:
# ================
# 1. Go Templates ({{ .var }}) - Variable interpolation throughout
# 2. field: "path" - Simple JSON path extraction (translated to CEL internally)
# 3. expression: "cel" - Full CEL expressions for complex logic
# ============================================================================
# CEL OPTIONAL CHAINING:
# ======================
# Use optional chaining with orValue() to safely access potentially missing fields:
#   resources.?clusterNamespace.?status.?phase.orValue("")
#   adapter.?executionStatus.orValue("")
#
# Copy this file to your adapter repository and customize for your needs.

apiVersion: hyperfleet.redhat.com/v1alpha1
kind: AdapterTaskConfig
metadata:
  name: example-adapter
  labels:
    hyperfleet.io/adapter-type: example-adapter
    hyperfleet.io/component: adapter
spec:
  # ============================================================================
  # Parameters
  # ============================================================================
  # Parameters extracted from CloudEvent and environment variables
  params:
    - name: "clusterId"
      source: "event.id"
      type: "string"
      required: true

    - name: "generationId"
      source: "event.generation"
      type: "int"
      required: true

    - name: "simulateResult"
      source: "env.SIMULATE_RESULT"
      type: "string"
      required: false

  # ============================================================================
  # Preconditions
  # ============================================================================
  # These preconditions run sequentially and validate cluster state before resource operations
  preconditions:
    - name: "clusterStatus"
      apiCall:
        method: "GET"
        url: "/clusters/{{ .clusterId }}"
        timeout: 10s
        retryAttempts: 3
        retryBackoff: "exponential"
      # Capture fields from the API response
      capture:
        - name: "clusterName"
          field: "name"
        - name: "generationId"
          field: "generation"
        - name: "timestamp"
          field: "created_time"
        - name: "readyConditionStatus"
          expression: |
            status.conditions.filter(c, c.type == "Ready").size() > 0
              ? status.conditions.filter(c, c.type == "Ready")[0].status
              : "False"

        - name: "placementClusterName"
          expression: "\"cluster1\""  # TBC: coming from placement adapter
          description: "Unique identifier for the target maestro consumer"

        - name: "adapterName"
          expression: "\"adapter1\""  # TBC: coming from config passed to params
          description: "Unique identifier for the adapter"

      # Structured conditions with valid operators
      conditions:
        - field: "readyConditionStatus"
          operator: "equals"
          value: "False"

    - name: "validationCheck"
      # Valid CEL expression
      expression: |
        readyConditionStatus == "False"

  # ============================================================================
  # Resources (Create/Update Resources)
  # ============================================================================
  # All resources are created/updated sequentially in the order defined below
  resources:
    - name: "agentNamespaceManifestWork"
      transport:
        client: "maestro"
        maestro:
          targetCluster: "{{ .placementClusterName }}"
      
      # ManifestWork manifest reference (external file recommended)
      manifest:
        ref: "/etc/adapter/manifestwork.yaml"
      
      # Discover the manifestWork by name
      discovery:
        byName: "{{ .clusterId }}"

      # Discover sub-resources within the manifestWork
      # Supports jsonPath to dig into resource status
      nestedDiscoveries:
        - name: "mgmtNamespace"
          discovery:
            bySelectors:
              labelSelector:
                hyperfleet.io/resource-type: "namespace"
                hyperfleet.io/cluster-id: "{{ .clusterId }}"  
        - name: "mgmtConfigMap"
          discovery:
            byName: "{{ .clusterId }}"

  # ============================================================================
  # Post-Processing
  # ============================================================================
  post:
    payloads:
      - name: "clusterStatusPayload"
        build:
          # Adapter name for tracking which adapter reported this status
          adapter: "{{ .metadata.name }}"
          
          # Conditions array - each condition has type, status, reason, message
          # Use CEL optional chaining ?.orValue() for safe field access
          conditions:
            # Applied: Resources successfully created
            - type: "Applied"
              status:
                expression: |
                  resources.?agentNamespaceManifestWork.mgmtNamespace.?status.?phase.orValue("") == "Active" ? "True" : "False"
              reason:
                expression: |
                  resources.?agentNamespaceManifestWork.mgmtNamespace.?status.?phase.orValue("") == "Active"
                    ? "NamespaceCreated"
                    : "NamespacePending"
              message:
                expression: |
                  resources.?agentNamespaceManifestWork.mgmtNamespace.?status.?phase.orValue("") == "Active"
                    ? "Namespace created successfully"
                    : "Namespace creation in progress"

            # Available: Resources are active and ready
            - type: "Available"
              status:
                expression: |
                  resources.?agentNamespaceManifestWork.mgmtNamespace.?status.?phase.orValue("") == "Active" ? "True" : "False"
              reason:
                expression: |
                  resources.?agentNamespaceManifestWork.mgmtNamespace.?status.?phase.orValue("") == "Active" ? "NamespaceReady" : "NamespaceNotReady"
              message:
                expression: |
                  resources.?agentNamespaceManifestWork.mgmtNamespace.?status.?phase.orValue("") == "Active" ? "Namespace is active and ready" : "Namespace is not active and ready"

            # Health: Adapter execution status (runtime)
            - type: "Health"
              status:
                expression: |
                  adapter.?executionStatus.orValue("") == "success" ? "True" : (adapter.?executionStatus.orValue("") == "failed" ? "False" : "Unknown")
              reason:
                expression: |
                  adapter.?errorReason.orValue("") != "" ? adapter.?errorReason.orValue("") : "Healthy"
              message:
                expression: |
                  adapter.?errorMessage.orValue("") != "" ? adapter.?errorMessage.orValue("") : "All adapter operations completed successfully"
          
          # Use CEL expression for numeric fields to preserve type
          observed_generation:
            expression: "generationId"
            
          # Use Go template with now and date functions for timestamps
          observed_time: "{{ now | date \"2006-01-02T15:04:05Z07:00\" }}"

          # Optional data field for adapter-specific metrics extracted from resources
          data:
            namespace:
              name:
                expression: |
                  resources.?agentNamespaceManifestWork.mgmtNamespace.?metadata.?name.orValue("")
              status:
                expression: |
                  resources.?agentNamespaceManifestWork.mgmtNamespace.?status.?phase.orValue("")

    postActions:
      - name: "reportClusterStatus"
        apiCall:
          method: "POST"
          url: "/clusters/{{ .clusterId }}/statuses"
          headers:
            - name: "Content-Type"
              value: "application/json"
          body: "{{ .clusterStatusPayload }}"
